name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Run RSpec
        run: |
          set -o pipefail
          COMMIT_SHA="${GITHUB_SHA:-$(git rev-parse HEAD)}"
          { echo "# commit: ${COMMIT_SHA}"; echo "---"; } > rspec-results.txt
          bundle exec rspec 2>&1 | tee -a rspec-results.txt

      - name: Run RuboCop
        run: |
          set -o pipefail
          COMMIT_SHA="${GITHUB_SHA:-$(git rev-parse HEAD)}"
          { echo "# commit: ${COMMIT_SHA}"; echo "---"; } > rubocop-results.txt
          bundle exec rubocop 2>&1 | tee -a rubocop-results.txt

      - name: Run Brakeman
        run: |
          set -o pipefail
          COMMIT_SHA="${GITHUB_SHA:-$(git rev-parse HEAD)}"
          { echo "# commit: ${COMMIT_SHA}"; echo "---"; } > brakeman-results.txt
          bundle exec brakeman --force --no-pager --quiet 2>&1 | tee -a brakeman-results.txt

      - name: Run bundle-audit
        run: |
          set -o pipefail
          COMMIT_SHA="${GITHUB_SHA:-$(git rev-parse HEAD)}"
          { echo "# commit: ${COMMIT_SHA}"; echo "---"; } > bundle-audit-results.txt
          bundle exec bundle-audit check --update 2>&1 | tee -a bundle-audit-results.txt

      - name: Run libyear-bundler
        run: |
          set -o pipefail
          COMMIT_SHA="${GITHUB_SHA:-$(git rev-parse HEAD)}"
          { echo "# commit: ${COMMIT_SHA}"; echo "---"; } > libyear-results.txt
          bundle config unset deployment
          bundle exec libyear-bundler 2>&1 | tee -a libyear-results.txt

      - name: Upload CI artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-results
          retention-days: 90
          path: |
            rspec-results.txt
            rubocop-results.txt
            brakeman-results.txt
            bundle-audit-results.txt
            libyear-results.txt

      - name: Configure AWS credentials
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-west-1
        continue-on-error: true

      - name: Load Solana keypair
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        env:
          SOLANA_KEYPAIR: ${{ secrets.SOLANA_KEYPAIR }}
        run: |
          if [ -n "$SOLANA_KEYPAIR" ]; then
            printf '%s' "$SOLANA_KEYPAIR" > /tmp/solana-keypair.json
            chmod 600 /tmp/solana-keypair.json
            echo "SOLANA_KEYPAIR_PATH=/tmp/solana-keypair.json" >> "$GITHUB_ENV"
          fi
        continue-on-error: true

      - name: Attest build on Solana
        if: github.ref == 'refs/heads/main' && github.event_name == 'push' && env.SOLANA_KEYPAIR_PATH != ''
        env:
          S3_COMPLIANCE_BUCKET: ${{ vars.S3_COMPLIANCE_BUCKET }}
        run: bundle exec ruby scripts/attest.rb
        continue-on-error: true

      - name: Cleanup Solana keypair
        if: always()
        run: rm -f /tmp/solana-keypair.json

  deploy:
    name: Deploy
    needs: check
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-west-1

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Build and deploy
        run: ./bin/deploy
